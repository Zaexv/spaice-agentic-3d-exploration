<div id="flight-hud" class="flight-hud ui-hideable">
  <div class="flight-hud-row">
    <span class="flight-hud-k">Speed:</span>
    <span class="flight-hud-v flight-hud-accent" id="hud-velocity">0.00 u/s</span>
  </div>
  <div class="flight-hud-row">
    <span class="flight-hud-k">Heading:</span>
    <span class="flight-hud-v" id="hud-heading">0.0°</span>
  </div>
  <div class="flight-hud-row">
    <span class="flight-hud-k">Position:</span>
    <span class="flight-hud-v">
      X <span id="hud-pos-x">0.0</span>
      Y <span id="hud-pos-y">0.0</span>
      Z <span id="hud-pos-z">0.0</span>
    </span>
  </div>
</div>
